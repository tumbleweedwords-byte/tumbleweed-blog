<!--
  TUMBLEWEED WORDS — TAGLINE SNIPPET
  ===================================
  
  HOW TO USE:
  
  1. COPY THE CSS below into your existing stylesheet (e.g. style.css),
     or paste it inside a <style> block in your index.html <head>.
  
  2. COPY THE HTML and paste it directly below your opening quote block
     on index.html — after the quote ("I wait for a train...") and 
     BEFORE the "Read the latest piece →" / "Browse the archive" links.
  
  That's it. One line of clarity between the atmosphere and the CTA.
-->
