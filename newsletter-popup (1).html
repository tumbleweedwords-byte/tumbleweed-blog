<!--
  TUMBLEWEED WORDS — NEWSLETTER POPUP
  =====================================
  Paste this entire block just before your closing </body> tag on every page.
  Replace src="YOUR-PHOTO.jpg" with your actual photo file.
  The popup fires after 8 seconds OR when the cursor leaves the viewport (exit intent).
  Once dismissed or subscribed, it won't show again for 14 days (localStorage).
-->

<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');

  /* ── Overlay ── */
  #tw-popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20, 10, 40, 0.55);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  #tw-popup-overlay.tw-active {
    display: flex;
  }

  /* ── Modal card ── */
  #tw-popup {
    background: #F0EBE1;
    border-top: 4px solid #5500D6;
    max-width: 420px;
    width: 100%;
    padding: 2.5rem 2rem 2rem;
    position: relative;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    animation: tw-popIn 0.3s ease;
  }

  @keyframes tw-popIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Close button ── */
  #tw-popup-close {
    position: absolute;
    top: 14px;
    right: 16px;
    background: none;
    border: none;
    font-size: 22px;
    color: #9A9490;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    transition: color 0.15s;
  }
  #tw-popup-close:hover { color: #1A1A1A; }

  /* ── Photo ── */
  .tw-popup__photo {
    display: block;
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 2px solid #5500D6;
    object-fit: cover;
    margin: 0 auto 0.75rem;
    background: #DDD5FF; /* fallback if photo missing */
  }

  /* ── Wordmark beneath photo ── */
  .tw-popup__wordmark {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 12px;
    font-style: italic;
    color: #5500D6;
    text-align: center;
    margin-bottom: 1rem;
    letter-spacing: 0.04em;
  }

  /* ── Headline ── */
  .tw-popup__headline {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    color: #1A1A1A;
    text-align: center;
    line-height: 1.25;
    margin-bottom: 0.6rem;
  }

  /* ── Subtext ── */
  .tw-popup__sub {
    font-size: 12px;
    color: #6B6560;
    text-align: center;
    line-height: 1.65;
    margin-bottom: 1.5rem;
  }

  /* ── Email input ── */
  .tw-popup__input {
    display: block;
    width: 100%;
    background: #fff;
    border: 1px solid #C5BDB0;
    color: #1A1A1A;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 11px 14px;
    margin-bottom: 10px;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .tw-popup__input:focus {
    border-color: #5500D6;
  }
  .tw-popup__input::placeholder { color: #B0A89E; }

  /* ── CTA button ── */
  .tw-popup__btn {
    display: block;
    width: 100%;
    background: #5500D6;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 13px;
    border: none;
    cursor: pointer;
    margin-bottom: 1rem;
    transition: background 0.2s;
  }
  .tw-popup__btn:hover { background: #6B1FE8; }

  /* ── Disclaimer ── */
  .tw-popup__disclaimer {
    font-size: 10px;
    color: #A89E94;
    letter-spacing: 0.04em;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 0.75rem;
  }

  /* ── "Not now" link ── */
  .tw-popup__dismiss {
    display: block;
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #A89E94;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    width: 100%;
    transition: color 0.15s;
  }
  .tw-popup__dismiss:hover { color: #5500D6; }
</style>

<!-- ── Popup markup ── -->
<div id="tw-popup-overlay" role="dialog" aria-modal="true" aria-label="Subscribe to Tumbleweed Words">
  <div id="tw-popup">

    <button id="tw-popup-close" aria-label="Close">&times;</button>

    <!-- ★ Replace with your actual photo file path ★ -->
    <img
      class="tw-popup__photo"
      src="YOUR-PHOTO.jpg"
      alt="David — Tumbleweed Words"
    />

    <p class="tw-popup__wordmark">Tumbleweed Words</p>

    <h2 class="tw-popup__headline">
      Stories from the streets,<br>sent to your inbox.
    </h2>

    <p class="tw-popup__sub">
      Flash fiction written in hostels, on trains,<br>
      and in streets that don't know your name.<br>
      Free. Weekly. No ads.
    </p>

    <input
      class="tw-popup__input"
      type="email"
      id="tw-popup-email"
      placeholder="Your email address"
      autocomplete="email"
    />

    <!-- Links directly to your Substack subscribe page -->
    <button class="tw-popup__btn" id="tw-popup-submit">
      Start reading free &rarr;
    </button>

    <p class="tw-popup__disclaimer">
      Free &middot; Weekly &middot; No spam &middot; Unsubscribe any time
    </p>

    <button class="tw-popup__dismiss" id="tw-popup-not-now">
      Not now
    </button>

  </div>
</div>

<script>
(function () {
  var STORAGE_KEY = 'tw_popup_dismissed';
  var DISMISS_DAYS = 14;
  var overlay     = document.getElementById('tw-popup-overlay');
  var closeBtn    = document.getElementById('tw-popup-close');
  var notNow      = document.getElementById('tw-popup-not-now');
  var submitBtn   = document.getElementById('tw-popup-submit');
  var emailInput  = document.getElementById('tw-popup-email');

  /* ── Check if already dismissed recently ── */
  function isDismissed () {
    var ts = localStorage.getItem(STORAGE_KEY);
    if (!ts) return false;
    var diff = Date.now() - parseInt(ts, 10);
    return diff < DISMISS_DAYS * 24 * 60 * 60 * 1000;
  }

  function showPopup () {
    if (isDismissed()) return;
    overlay.classList.add('tw-active');
    document.body.style.overflow = 'hidden';
  }

  function hidePopup () {
    overlay.classList.remove('tw-active');
    document.body.style.overflow = '';
    localStorage.setItem(STORAGE_KEY, Date.now().toString());
  }

  /* ── Trigger 1: 8-second delay ── */
  var delayTimer = setTimeout(showPopup, 8000);

  /* ── Trigger 2: Exit intent (cursor leaves top of viewport) ── */
  document.addEventListener('mouseleave', function (e) {
    if (e.clientY < 10) {
      clearTimeout(delayTimer);
      showPopup();
    }
  });

  /* ── Close actions ── */
  closeBtn.addEventListener('click', hidePopup);
  notNow.addEventListener('click', hidePopup);

  /* ── Click outside modal ── */
  overlay.addEventListener('click', function (e) {
    if (e.target === overlay) hidePopup();
  });

  /* ── Escape key ── */
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') hidePopup();
  });

  /* ── Submit: forward email to Substack ── */
  submitBtn.addEventListener('click', function () {
    var email = emailInput.value.trim();
    var substackUrl = 'https://tumbleweedwords.substack.com/subscribe';
    if (email) {
      /* Substack accepts ?email= param on the subscribe URL */
      window.open(substackUrl + '?email=' + encodeURIComponent(email), '_blank');
    } else {
      window.open(substackUrl, '_blank');
    }
    hidePopup();
  });

  /* ── Also submit on Enter key ── */
  emailInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submitBtn.click();
  });

}());
</script>
