<!--
  TUMBLEWEED WORDS — HERO BANNER
  ================================
  Drop this block at the very top of your page <body>, ABOVE your existing nav.
  Replace src="YOUR-LOGO-FILE.png" with your actual logo filename.
  The cream background (#F0EBE1) matches your existing nav.
-->

<style>
  /* ── Google Font for editorial subtext ── */
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap');

  /* ── Brand tokens ── */
  :root {
    --tw-purple:      #5500D6;
    --tw-purple-mid:  #6B1FE8;
    --tw-purple-pale: #EDE5FF;
    --tw-cream:       #F0EBE1;
    --tw-cream-dark:  #E8E0D0;
    --tw-ink:         #1A1A1A;
    --tw-muted:       #6B6560;
  }

  /* ── Hero wrapper ── */
  .tw-hero {
    background: var(--tw-cream);
    border-bottom: 2px solid var(--tw-purple);
    padding: 3.5rem 1.5rem 3rem;
    text-align: center;
    font-family: 'Inter', sans-serif;
  }

  /* ── Logo image ── */
  .tw-hero__logo {
    display: block;
    margin: 0 auto 0.6rem;
    max-width: 380px;
    width: 80%;
    height: auto;
  }

  /* ── Eyebrow line under logo ── */
  .tw-hero__eyebrow {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--tw-muted);
    margin-bottom: 1.6rem;
  }

  /* ── Literary quote / tagline ── */
  .tw-hero__quote {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: clamp(16px, 2.2vw, 20px);
    font-style: italic;
    color: var(--tw-ink);
    line-height: 1.65;
    max-width: 560px;
    margin: 0 auto 2rem;
    opacity: 0.85;
  }

  /* ── CTA row ── */
  .tw-hero__cta {
    display: flex;
    gap: 18px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .tw-btn-primary {
    display: inline-block;
    background: var(--tw-purple);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 11px 26px;
    text-decoration: none;
    border: 2px solid var(--tw-purple);
    transition: background 0.2s, color 0.2s;
    cursor: pointer;
  }
  .tw-btn-primary:hover {
    background: var(--tw-purple-mid);
    border-color: var(--tw-purple-mid);
  }

  .tw-btn-ghost {
    display: inline-block;
    background: transparent;
    color: var(--tw-purple);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 11px 0;
    text-decoration: none;
    border-bottom: 1px solid var(--tw-purple);
    transition: opacity 0.2s;
    cursor: pointer;
  }
  .tw-btn-ghost:hover { opacity: 0.65; }

  /* ── Trust strip ── */
  .tw-hero__trust {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--tw-muted);
  }
  .tw-hero__trust span::before {
    content: '·';
    margin-right: 24px;
  }
  .tw-hero__trust span:first-child::before {
    content: '';
    margin-right: 0;
  }
</style>

<section class="tw-hero">

  <!-- ★ Replace with your actual logo file path ★ -->
  <img
    class="tw-hero__logo"
    src="YOUR-LOGO-FILE.png"
    alt="Tumbleweed Words"
  />

  <p class="tw-hero__eyebrow">Flash fiction written from the road &middot; Est. 2021 &middot; Edinburgh</p>

  <p class="tw-hero__quote">
    &ldquo;I wait for a train that circles the city like bats.
    At night in Berlin you can imagine anything you want.&rdquo;
  </p>

  <div class="tw-hero__cta">
    <a class="tw-btn-primary" href="https://tumbleweedwords.substack.com">
      Subscribe free
    </a>
    <a class="tw-btn-ghost" href="https://tumbleweedwords.substack.com">
      Read the archive &rarr;
    </a>
  </div>

  <div class="tw-hero__trust">
    <span>Free</span>
    <span>Weekly</span>
    <span>No ads</span>
    <span>1,000+ readers</span>
    <span>Pushcart nominated</span>
  </div>

</section>
